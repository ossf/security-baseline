title: OSPS Baseline to OpenSSF Best Practices Badge Mapping
metadata:
  id: osps-baseline-to-bpb
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to OpenSSF Best Practices Badge. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: baseline-authors
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: BPB
      title: OpenSSF Best Practices Badge
      version: "2024"
      url: https://github.com/coreinfrastructure/best-practices-badge/blob/main/criteria/criteria.yml
      description: The Open Source Security Foundation (OpenSSF) Best Practices Badge is a way for Free/Libre and Open Source Software (FLOSS) projects to show that they follow best practices. Projects
        can voluntarily self-certify, at no cost, by using this web application to explain how they follow each best practice. The OpenSSF Best Practices Badge is inspired by the many badges available to
        projects on GitHub. Consumers of the badge can quickly assess which FLOSS projects are following best practices and, as a result, are more likely to produce higher-quality secure software.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: BPB
  entry-type: Guideline
