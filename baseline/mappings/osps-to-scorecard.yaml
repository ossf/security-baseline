title: OSPS Baseline to OpenSSF Scorecard Mapping
metadata:
  id: osps-baseline-to-scorecard
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to OpenSSF Scorecard. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: baseline-authors
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: Scorecard
      title: OpenSSF Scorecard
      version: "5.0"
      url: https://github.com/ossf/scorecard
      description: OpenSSF Scorecard is an automated tool that assesses a number of important heuristics ('checks') associated with software security and assigns each check a score of 0-10. You can use
        these scores to understand specific areas to improve in order to strengthen the security posture of your project.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: Scorecard
  entry-type: Guideline
mappings:
