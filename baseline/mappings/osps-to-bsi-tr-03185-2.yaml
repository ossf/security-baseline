title: OSPS Baseline to BSI TR-03185-2 Mapping
metadata:
  id: osps-baseline-to-bsi-tr-03185-2
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to BSI TR-03185-2. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: BSI-TR-03185-2
      title: BSI TR-03185-2 Secure Software Lifecycle for Open Source Software
      version: "v1.1.0"
      url: https://www.bsi.bund.de/SharedDocs/Downloads/EN/BSI/Publications/TechGuidelines/TR03185/BSI-TR-03185-2.pdf?__blob=publicationFile&v=5
      description: Secure software is essential for the use of IT products in governments, businesses and societies.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
