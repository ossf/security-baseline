title: OSPS Baseline to UK NCSC Software Security Code of Practice Mapping
metadata:
  id: osps-baseline-to-uksscop
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to UK NCSC Software Security Code of Practice. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: baseline-authors
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: UKSSCOP
      title: United Kingdom National Cyber Security Centre Software Security Code of Practice
      version: "2025-05-07"
      url: https://www.ncsc.gov.uk/guidance/software-security-code-of-practice-assurance-principles-claims
      description: The Software Code of Practice has been created by DSIT and the National Cyber Security Centre (NCSC), the UK’s technical authority for cyber security, and is co-sealed by the Canadian
        Centre for Cyber Security (CCCS). The Code reflects the government’s ongoing focus on codifying minimum standards for technology providers to reduce cyber risk. It is aimed at professionals who
        are responsible for overseeing the development of ‘commodity’ software, including technical, compliance, and risk experts. For those organisations that require a higher level of assurance in the
        resilience of their connected products and technology, consider using the NCSC’s Cyber Resilience Testing scheme.
