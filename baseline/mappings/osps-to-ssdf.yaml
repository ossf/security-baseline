title: OSPS Baseline to NIST SSDF Mapping
metadata:
  id: osps-baseline-to-ssdf
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to NIST SSDF. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: SSDF
      title: Secure Software Development Framework
      version: "1.1"
      url: https://csrc.nist.gov/pubs/sp/800/218/final
      description: The Secure Software Development Framework (SSDF) is a set of fundamental, sound, and secure software development practices based on established secure software development practice documents
        from organizations such as BSA, OWASP, and SAFECode. Few software development life cycle (SDLC) models explicitly address software security in detail, so practices like those in the SSDF need to
        be added to and integrated with each SDLC implementation. Following the SSDF practices should help software producers reduce the number of vulnerabilities in released software, reduce the potential
        impact of the exploitation of undetected or unaddressed vulnerabilities, and address the root causes of vulnerabilities to prevent recurrences. Also, because the SSDF provides a common language
        for describing secure software development practices, software producers and acquirers can use it to foster their communications for procurement processes and other management activities.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: SSDF
  entry-type: Guideline
