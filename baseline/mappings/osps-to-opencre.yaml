title: OSPS Baseline to OpenCRE Mapping
metadata:
  id: osps-baseline-to-opencre
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to OpenCRE. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: OpenCRE
      title: Open Cybersecurity Reference Architecture
      version: "2024"
      url: https://github.com/OWASP/OpenCRE
      description: OpenCRE stands for Open Common Requirement enumeration. It is an interactive content linking platform for uniting security standards and guidelines. It offers easy and robust access to
        relevant information when designing, developing, testing and procuring secure software.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: OpenCRE
  entry-type: Guideline
