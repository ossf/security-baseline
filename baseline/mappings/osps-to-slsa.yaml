title: OSPS Baseline to SLSA Mapping
metadata:
  id: osps-baseline-to-slsa
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to SLSA. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: SLSA
      title: Supply Chain Levels for Software Artifacts
      version: "1.0"
      url: https://github.com/slsa-framework/slsa
      description: SLSA (pronounced "salsa") is a security framework from source to service, giving anyone working with software a common language for increasing levels of software security and supply chain
        integrity. It’s how you get from safe enough to being as resilient as possible, at any link in the chain.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: SLSA
  entry-type: Guideline
mappings:
  - id: M-OSPS-AC-04-SLSA
    source: OSPS-AC-04
    relationship: relates-to
    targets:
      - entry-id: Producer - Choose an appropriate build platform
      - entry-id: Build platform - Isolation strength - Isolated
  - id: M-OSPS-BR-01-SLSA
    source: OSPS-BR-01
    relationship: relates-to
    targets:
      - entry-id: Choose an appropriate build platform
  - id: M-OSPS-BR-02-SLSA
    source: OSPS-BR-02
    relationship: relates-to
    targets:
      - entry-id: Follow a consistent build process
      - entry-id: Provenance generation- Exists, Authentic
  - id: M-OSPS-BR-03-SLSA
    source: OSPS-BR-03
    relationship: relates-to
    targets:
      - entry-id: Choose an appropriate build platform
  - id: M-OSPS-BR-04-SLSA
    source: OSPS-BR-04
    relationship: relates-to
    targets:
      - entry-id: Choose an appropriate build platform
      - entry-id: Follow a consistent build process
      - entry-id: Build platform - Isolation strength - isolated
  - id: M-OSPS-BR-05-SLSA
    source: OSPS-BR-05
    relationship: relates-to
    targets:
      - entry-id: Isolation strength - isolated
  - id: M-OSPS-BR-06-SLSA
    source: OSPS-BR-06
    relationship: relates-to
    targets:
      - entry-id: Distribute provenance - Exists
  - id: M-OSPS-QA-01-SLSA
    source: OSPS-QA-01
    relationship: relates-to
    targets:
      - entry-id: Build platform - isolation strength - Isolated
  - id: M-OSPS-QA-04-SLSA
    source: OSPS-QA-04
    relationship: relates-to
    targets:
      - entry-id: Build platform - isolation strength - Isolated
