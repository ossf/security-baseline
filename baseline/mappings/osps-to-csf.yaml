title: OSPS Baseline to NIST CSF 2.0 Mapping
metadata:
  id: osps-baseline-to-csf
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to NIST CSF 2.0. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: CSF
      title: NIST Cybersecurity Framework
      version: "2.0"
      url: https://nvlpubs.nist.gov/nistpubs/CSWP/NIST.CSWP.29.pdf
      description: The NIST Cybersecurity Framework (CSF) 2.0 provides guidance to industry, government agencies, and other organizations to manage cybersecurity risks. It offers a taxonomy of high level
        cybersecurity outcomes that can be used by any organization — regardless of its size, sector, or maturity — to better understand, assess, prioritize, and communicate its cybersecurity efforts. The
        CSF does not prescribe how outcomes should be achieved. Rather, it links to online resources that provide additional guidance on practices and controls that could be used to achieve those outcomes.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: CSF
  entry-type: Guideline
