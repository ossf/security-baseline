title: OSPS Baseline to ISO/IEC 18974 Mapping
metadata:
  id: osps-baseline-to-iso-18974
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to ISO/IEC 18974. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: openssf
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: ISO-18974
      title: ISO/IEC 18974
      version: "1.0 - 2023-12"
      url: https://openchainproject.org/security-assurance
      description: 'ISO/IEC 18974 helps organizations check open source for known security vulnerability issues like CVEs, GitHub dependency alerts or package manager alerts. ISO/IEC 18974 identifies: The
        key places to have security processes, How to assign roles and responsibilities, And how to ensure sustainability of the processes. ISO/IEC 18974 is lightweight, easy to read and is supported by
        our global community with free reference material and conformance resources.'
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: ISO-18974
  entry-type: Guideline
