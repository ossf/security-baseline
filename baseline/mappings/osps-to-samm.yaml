title: OSPS Baseline to OWASP SAMM Mapping
metadata:
  id: osps-baseline-to-samm
  type: MappingDocument
  gemara-version: "1.2.0"
  description: |
    Cross-walk from the Open Source Project Security (OSPS) Baseline
    controls to OWASP SAMM. Each mapping asserts a "relates-to"
    relationship; strength, confidence-level, and rationale are left
    unset and should be added as the mappings are individually
    reviewed.
  draft: true
  author:
    id: baseline-authors
    name: OSPS Baseline Authors
    type: Human
  mapping-references:
    - id: osps-baseline
      title: Open Source Project Security Baseline
      version: "draft"
      url: https://github.com/ossf/security-baseline
      description: |
        The Open Source Project Security (OSPS) Baseline is a set of security
        criteria that projects should meet to demonstrate a strong security
        posture.
    - id: SAMM
      title: OWASP Software Assurance Maturity Model
      version: "2.0"
      url: https://owaspsamm.org/model/
      description: The mission of OWASP Software Assurance Maturity Model (SAMM) is to be the prime maturity model for software assurance that provides an effective and measurable way for all types of organizations
        to analyze and improve their software security posture. OWASP SAMM supports the complete software lifecycle, including development and acquisition, and is technology and process agnostic. It is
        intentionally built to be evolutive and risk-driven in nature.
source-reference:
  reference-id: osps-baseline
  entry-type: Control
target-reference:
  reference-id: SAMM
  entry-type: Guideline
